<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
		/>
		<title>人数入力画面</title>
		<link rel="stylesheet" href="assets/css/entrance.css" />
		<script src="assets/js/entrance.js"></script>

		<!-- PWA Settings -->
		<link rel="manifest" href="manifest.json" />
		<meta name="theme-color" content="#007bff" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="G04 Entrance" />
	</head>
	<body>
		<div class="container">
			<!-- LEFT PANEL -->
			<div class="info-panel">
				<header>
					<h1>いらっしゃいませ</h1>
				</header>
				<div class="display-area">
					<div class="input-label">人数を入力してください</div>
					<div id="displayCount" class="input-display"></div>
				</div>
			</div>

			<!-- RIGHT PANEL -->
			<div class="keypad-panel">
				<div class="keypad">
					<div class="key" data-value="1">1</div>
					<div class="key" data-value="2">2</div>
					<div class="key" data-value="3">3</div>
					<div class="key" data-value="4">4</div>
					<div class="key" data-value="5">5</div>
					<div class="key" data-value="6">6</div>
					<div class="key" data-value="7">7</div>
					<div class="key" data-value="8">8</div>
					<div class="key" data-value="9">9</div>
					<div class="key action-clear">クリア</div>
					<div class="key" data-value="0">0</div>
					<div class="key action-backspace">⌫</div>
					<div class="key action-submit">確定</div>
				</div>
			</div>

			<div id="message"></div>
		</div>
	</body>
</html>
