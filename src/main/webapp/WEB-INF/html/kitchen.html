<!doctype html>
<html lang="ja">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>キッチン管理画面 | Order Management System</title>
		<meta name="description" content="リアルタイム注文管理システム - キッチン担当者向け" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="stylesheet" href="assets/css/kitchen.css" />
		<script src="assets/js/kitchen.js" defer></script>

		<!-- PWA Settings -->
		<link rel="manifest" href="manifest.json" />
		<meta name="theme-color" content="#000" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="G04 Kitchen" />
	</head>
	<body>
		<div class="container">
			<header class="header">
				<div>
					<h1>キッチン管理画面</h1>
					<p class="header-subtitle">リアルタイム注文追跡システム</p>
				</div>
				<div class="status-indicator">
					<span class="status-text">接続状態:</span>
					<span id="connection-status" class="status-connected">接続中</span>
				</div>
			</header>

			<main class="main-content">
				<div class="orders-section">
					<h2>
						🍳 調理待ち注文
						<span id="order-count">(0)</span>
					</h2>
					<div id="loading" class="loading">
						<div class="loading-spinner"></div>
						<span>注文を読み込み中...</span>
					</div>
					<div id="orders-container" class="orders-container"></div>
					<div id="no-orders" class="no-orders hidden">
						<div class="no-orders-icon">🎯</div>
						<h3>調理待ちの注文はありません</h3>
						<p>新しい注文が入ると自動で表示されます</p>
					</div>
				</div>
			</main>
		</div>
	</body>
</html>
